<div data-controller="problem-statement">
  <div data-problem-statement-target="placeholder" class="flex items-center justify-center h-full">
    <p class="text-sm text-base-content/40">Select a problem to view its statement.</p>
  </div>

  <div data-problem-statement-target="content" class="hidden p-5">
    <div class="flex items-center gap-2 mb-4">
      <h2 data-problem-statement-target="title" class="text-xl font-bold"></h2>
      <span data-problem-statement-target="badge" class="text-xs rounded px-1.5 py-0.5 font-medium"></span>
    </div>
    <div data-problem-statement-target="description" class="prose max-w-none"></div>
  </div>
</div>
